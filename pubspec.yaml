name: koala
description: "Koala - AI Interior Design Assistant by evlumba.com"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.82+86

environment:
  sdk: ^3.10.8

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_auth_platform_interface: ^8.1.7
  firebase_messaging: ^16.1.2
  firebase_crashlytics: ^5.0.2
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1

  http: ^1.6.0
  intl: ^0.20.2
  uuid: ^4.5.3
  supabase_flutter: ^2.12.0
  shared_preferences: ^2.5.4
  crypto: ^3.0.7
  go_router: ^14.0.0
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  universal_html: ^2.2.4
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  lucide_icons: ^0.257.0

  # ═══ Sprint 1 ekleri — Snap akışı + mobil monetizasyon ═══
  # Cihaz-tarafı face detection — selfie/troll fotolarını Gemini'ye hit etmeden 50ms'de ele.
  google_mlkit_face_detection: ^0.13.2
  # Cihaz-tarafı image labeling — kedi/yemek/araba fotolarını da Gemini'ye gitmeden
  # ele. Selfie gate + bu = ContentGate v2. Her analyze'da ~$0.003 Gemini tasarrufu.
  google_mlkit_image_labeling: ^0.14.0
  # NOT: palette_generator discontinued — Gemini zaten colors dönüyor, gerek yok.
  # Yükleme sonrası kırp/düzleştir UX.
  image_cropper: ^9.0.0
  crop_your_image: ^2.0.0
  image: ^4.5.0
  gal: ^2.3.2
  # Moodboard reveal + mikro-interaksiyon staggered animasyonları.
  flutter_animate: ^4.5.0
  # iOS IAP + Android Play Billing tek SDK (Sprint 6'da aktif ama şimdi ekle).
  purchases_flutter: ^9.7.0
  # Pro chat screenshot → share card (share_plus zaten var, ekstra screenshot capture).
  screenshot: ^3.0.0
  # ML Kit face detection için temp dosya path'i.
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# ═══ Uygulama ikonu ═══
# Kaynak: assets/launcher/icon.png (1024x1024)
# Kullanım: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#6B5BE6"
  adaptive_icon_foreground: "assets/launcher/icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/launcher/icon.png"
    background_color: "#6B5BE6"
    theme_color: "#6B5BE6"

# ═══ Splash ekranı ═══
# Flutter default logo'sunu kaldırıp Koala ikon + mor arkaplan.
# Kullanım: flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#6B5BE6"
  image: "assets/launcher/splash.png"
  android_12:
    color: "#6B5BE6"
    image: "assets/launcher/splash.png"
  android: true
  ios: true
  web: false
  fullscreen: true

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/images/
    # Curated before/after pair — Gemini ile aynı odanın boş ve tasarlı
    # versiyonları üretildi (assets/showcase/before.webp + after.webp).
    # Toplam ~86KB, ana sayfa Card 1'in hero before/after wipe gösteriminde
    # kullanılıyor. Network değil bundle → 0 jank, instant render.
    - assets/showcase/
    # google_fonts paketi runtime'da fonts.googleapis.com'dan font çekmek
    # yerine bundle'daki TTF'leri kullanır (assets/google_fonts/ altında doğru
    # isimli dosya varsa). Bu klasör + main.dart'taki `allowRuntimeFetching=false`
    # sayesinde CLS biter, 1 DNS lookup + 1 TLS handshake kaybolur, privacy iyileşir.
    # Aynı Manrope fontları, sadece kaynak lokalden.
    - assets/google_fonts/
    # NOT: assets/launcher/ runtime'da kullanılmıyor — sadece
    # flutter_launcher_icons + flutter_native_splash dev-time tool'ları
    # için kaynak. AAB/APK'ya paketlemeye gerek yok (~1 MB kazanç).
    # style_discovery görselleri artık CachedNetworkImage ile yükleniyor

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
