  <style>
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px white inset !important;
      background-color: white !important;
    }
    input {
      background-color: transparent !important;
    }
    flt-glass-pane {
      background-color: white !important;
    }

    /* Pre-Flutter loader — beyaz ekran yerine logo+spinner.
       Flutter mount olunca flt-glass-pane üstünü kapatır ve CSS
       rule'u ile gizlenir (layout'ta kalmaz). */
    html, body { margin: 0; padding: 0; background-color: #ffffff; }
    #koala-preloader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      z-index: 0;
      transition: opacity 220ms ease-out;
    }
    #koala-preloader .kp-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      /* ?v=2 — Eski Flutter-default ikonu immutable cache'te kalmış
         kullanıcılara yeni Koala ikonu zorla yüklet. Deploy başına
         bir kez artır, gerekmedikçe değiştirme. */
      background-image: url('icons/Icon-192.png?v=2');
      background-size: cover;
      background-position: center;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.18);
      margin-bottom: 20px;
    }
    #koala-preloader .kp-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.18);
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: kp-rot 0.9s linear infinite;
    }
    @keyframes kp-rot { to { transform: rotate(360deg); } }
    /* Flutter canvas gelir gelmez loader'ı gizle */
    body:has(flt-glass-pane) #koala-preloader { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="koala-preloader" aria-hidden="true">
    <div class="kp-logo"></div>
    <div class="kp-spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
